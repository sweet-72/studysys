version: "3.8"

services:
  smartclass-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartclass-app
    ports:
      - "${APP_PORT:-8101}:8101"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://mysql:3306/smart_class?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-change_me}
      SPRING_REDIS_HOST: ${SPRING_REDIS_HOST:-redis}
      SPRING_REDIS_PORT: ${SPRING_REDIS_PORT:-6379}
      SPRING_REDIS_PASSWORD: ${SPRING_REDIS_PASSWORD:-change_me}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_ELASTICSEARCH_URIS: ${SPRING_ELASTICSEARCH_URIS:-http://elasticsearch:9200}
    depends_on:
      - mysql
      - redis
      - elasticsearch
    networks:
      - smartclass-network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: smartclass-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smart_class}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - smartclass-network
    restart: unless-stopped

  redis:
    image: redis:6.2
    container_name: smartclass-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me} --save "" --stop-writes-on-bgsave-error no --appendonly no --loglevel warning
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - smartclass-network
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:7.17.4
    container_name: smartclass-elasticsearch
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms512m -Xmx512m
      xpack.security.enabled: "false"
    ports:
      - "${ES_HTTP_PORT:-9200}:9200"
      - "${ES_TRANSPORT_PORT:-9300}:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - smartclass-network
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  elasticsearch-data:

networks:
  smartclass-network:
    driver: bridge
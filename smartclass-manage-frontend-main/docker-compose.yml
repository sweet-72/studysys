version: "3"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartclass-manage-frontend
    restart: unless-stopped
    ports:
      - "${MANAGE_FRONTEND_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    environment:
      API_URL: ${API_URL:-http://localhost:8101/api}
    networks:
      - smartclass-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  smartclass-network:
    driver: bridge
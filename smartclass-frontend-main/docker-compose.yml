version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartclass-frontend
    ports:
      - "${USER_FRONTEND_PORT:-80}:80"
    restart: unless-stopped
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8101/api}
    networks:
      - app-network

  dev:
    image: node:18-alpine
    container_name: smartclass-frontend-dev
    working_dir: /app
    command: npm run dev
    ports:
      - "${USER_FRONTEND_DEV_PORT:-3000}:3000"
    volumes:
      - .:/app
    environment:
      NODE_ENV: development
    networks:
      - app-network
    profiles:
      - dev

networks:
  app-network:
    driver: bridge